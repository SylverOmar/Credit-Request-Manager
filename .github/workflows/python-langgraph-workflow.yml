name: Python LangGraph Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/python-langgraph-workflow.yml"
      - ".github/workflows/credit-pre-evaluation/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/python-langgraph-workflow.yml"
      - ".github/workflows/credit-pre-evaluation/**"

jobs:
  workflow-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/workflows/credit-pre-evaluation/requirements.txt

      - name: Install workflow dependencies
        run: pip install -r .github/workflows/credit-pre-evaluation/requirements.txt

      - name: Run LangGraph workflow smoke test
        run: python .github/workflows/credit-pre-evaluation/test_credit_pre_evaluation.py
